<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>RT-PMIS 互動式可移動心智圖</title>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #f8f9fa; overflow: hidden;}
    #mynetwork { width: 100vw; height: 100vh; border: none; }
    #info { 
      position: absolute; top: 20px; left: 20px; background: white; padding: 20px; 
      border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); z-index: 10; 
      cursor: pointer; min-width: 200px;
    }
    h3 { margin: 0 0 15px 0; font-size: 18px; color: #2c3e50; }
    .legend-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 14px; font-weight: bold; color: #333;}
    .color-box { width: 35px; height: 6px; margin-right: 12px; border-radius: 3px;}
    .hint { font-size: 12px; color: #6c757d; margin-top: 15px; font-weight: normal; border-top: 1px solid #eee; padding-top: 10px;}
  </style>
</head>
<body>
  <div id="info">
    <h3>📌 RT-PMIS 可移動心智圖</h3>
    <div class="legend-item"><div class="color-box" style="background: #ffc107;"></div><span>⭐ 官方合法寫入</span></div>
    <div class="legend-item"><div class="color-box" style="background: #17a2b8;"></div><span>🟦 正常拋轉庫</span></div>
    <div class="legend-item"><div class="color-box" style="background: #d63384;"></div><span>🩷 圖文佐證</span></div>
    <div class="legend-item"><div class="color-box" style="background: #0dcaf0;"></div><span>🩵 儀表板掃描</span></div>
    <div class="legend-item"><div class="color-box" style="background: #dc3545;"></div><span>🔴 斷鏈/嚴禁行為</span></div>
    <div class="legend-item"><div class="color-box" style="background: #28a745;"></div><span>🟢 系統連帶派發</span></div>
    <div class="hint">
        <b>操作指南：</b><br>
        🖱️ <b>拖曳節點</b>：可任意重組架構<br>
        🖲️ <b>滾動滾輪</b>：無限放大縮小<br>
        ✋ <b>拖曳背景</b>：平移整張畫布<br>
        <i>(點擊此面板即可隱藏)</i>
    </div>
  </div>
  <div id="mynetwork"></div>

  <script type="text/javascript">
    // 點擊隱藏提示面板
    document.getElementById('info').onclick = function() {
        this.style.display = 'none';
    };

    // 定義所有節點 Nodes
    var nodes = new vis.DataSet([
      { id: 'Dash', label: '專案儀表板', shape: 'box', color: '#e2d9f3', font: {size: 24, color: '#3b1e70', bold: true}, borderWidth: 2 },
      
      { id: 'P_C', label: '📸 施工照片', shape: 'box', color: '#fce4ec', font: {color: '#880e4f', size: 18} },
      { id: 'P_M', label: '📸 材料照片', shape: 'box', color: '#fce4ec', font: {color: '#880e4f', size: 18} },

      { id: 'PEI', label: '⭐ 計畫匯入', shape: 'box', color: '#fff3cd', font: {color: '#856404', size: 18} },
      { id: 'DJ', label: '⭐ 歷史同步', shape: 'box', color: '#fff3cd', font: {color: '#856404', size: 18} },
      { id: 'DM', label: '🔴 PDF匯入\n(斷鏈)', shape: 'box', color: '#f8d7da', font: {color: '#721c24', size: 18} },
      { id: 'DF', label: '🔴 手寫日誌中心\n(嚴重漏存)', shape: 'box', color: '#f8d7da', font: {color: '#721c24', size: 20, bold: true}, borderWidth: 2 },
      { id: 'IQM', label: '🟢 快速抽查', shape: 'box', color: '#d4edda', font: {color: '#155724', size: 18} },

      { id: 'Qty', label: '🔴 缺失管制表', shape: 'box', color: '#f8d7da', font: {color: '#721c24', size: 18} },
      { id: 'Mat', label: '🔴 檢驗管制表', shape: 'box', color: '#f8d7da', font: {color: '#721c24', size: 18} },

      // 資料庫
      { id: 'DB_PROG', label: '進度庫\n[progress_records]', shape: 'cylinder', color: '#cce5ff', font: {color: '#004085', size: 18} },
      { id: 'DB_LOG', label: '日誌庫\n[daily_logs]', shape: 'cylinder', color: '#cce5ff', font: {color: '#004085', size: 18} },
      { id: 'DB_ITEM', label: '工項庫\n[daily_report_items]', shape: 'cylinder', color: '#cce5ff', font: {color: '#004085', size: 18} },
      { id: 'DB_INSP', label: '抽查單\n[inspections]', shape: 'cylinder', color: '#cce5ff', font: {color: '#004085', size: 18} },
      { id: 'DB_ISSUE', label: '缺失單\n[quality_issues]', shape: 'cylinder', color: '#cce5ff', font: {color: '#004085', size: 18} },
      { id: 'DB_TEST', label: '試驗庫\n[mcs_test]', shape: 'cylinder', color: '#cce5ff', font: {color: '#004085', size: 18} },
      { id: 'DB_MAT', label: '進場單\n[material_entries]', shape: 'cylinder', color: '#cce5ff', font: {color: '#004085', size: 18} },
    ]);

    // 定義連線邏輯 Edges
    var edges = new vis.DataSet([
      // 進度寫入
      { from: 'PEI', to: 'DB_PROG', label: '允許預定計畫', color: {color: '#ffc107'}, arrows: 'to', width: 3 },
      { from: 'DJ', to: 'DB_PROG', label: '專屬實際進度', color: {color: '#ffc107'}, arrows: 'to', width: 3 },
      { from: 'DM', to: 'DB_PROG', label: '漏寫實際進度', color: {color: '#dc3545'}, dashes: true, arrows: 'to', width: 2 },
      { from: 'DF', to: 'DB_PROG', label: '禁止手寫實際進度', color: {color: '#dc3545'}, dashes: true, arrows: 'to', width: 2 },
      { from: 'DF', to: 'DB_PROG', label: '允許手寫預定進度', color: {color: '#17a2b8'}, arrows: 'to', width: 2 },

      // 日誌向下派發
      { from: 'DF', to: 'DB_LOG', label: '備忘入庫', color: {color: '#17a2b8'}, arrows: 'to', width: 2 },
      { from: 'DF', to: 'DB_ITEM', label: '建置工項', color: {color: '#17a2b8'}, arrows: 'to', width: 2 },
      { from: 'DF', to: 'DB_INSP', label: '漏拋抽查', color: {color: '#dc3545'}, dashes: true, arrows: 'to', width: 2 },
      { from: 'DF', to: 'DB_TEST', label: '漏拋試驗', color: {color: '#dc3545'}, dashes: true, arrows: 'to', width: 2 },
      { from: 'DM', to: 'DB_ITEM', label: '漏建工項', color: {color: '#dc3545'}, dashes: true, arrows: 'to', width: 2 },
      { from: 'IQM', to: 'DB_INSP', label: '寫入抽查', color: {color: '#17a2b8'}, arrows: 'to', width: 2 },

      // 品質衍生因果
      { from: 'DB_INSP', to: 'DB_ISSUE', label: '不合格派發缺失', color: {color: '#28a745'}, arrows: 'to', width: 3 },
      { from: 'DB_TEST', to: 'DB_ISSUE', label: '試驗失敗派發', color: {color: '#28a745'}, arrows: 'to', width: 3 },
      { from: 'Mat', to: 'DB_MAT', label: '管制單開立', color: {color: '#17a2b8'}, arrows: 'to', width: 2 },
      { from: 'Qty', to: 'DB_ISSUE', label: '手動輸入缺失單', color: {color: '#17a2b8'}, arrows: 'to', width: 2 },

      // 照片圖文佐證
      { from: 'P_C', to: 'DB_INSP', label: '施工佐證', color: {color: '#d63384'}, dashes: [5, 5], arrows: 'to', width: 2 },
      { from: 'P_C', to: 'DB_ISSUE', label: '改善佐證', color: {color: '#d63384'}, dashes: [5, 5], arrows: 'to', width: 2 },
      { from: 'P_M', to: 'DB_MAT', label: '卸貨查驗佐證', color: {color: '#d63384'}, dashes: [5, 5], arrows: 'to', width: 2 },
      { from: 'P_M', to: 'DB_TEST', label: '取樣佐證', color: {color: '#d63384'}, dashes: [5, 5], arrows: 'to', width: 2 },

      // 儀表板掃描
      { from: 'DB_ITEM', to: 'Dash', label: '掃描日誌工項', color: {color: '#0dcaf0'}, dashes: [10, 10], arrows: 'to', width: 3 },
      { from: 'Dash', to: 'DB_MAT', label: '反向查核材料漏交', color: {color: '#0dcaf0'}, dashes: [10, 10], arrows: 'to', width: 3 }
    ]);

    // 初始化網路畫布
    var container = document.getElementById('mynetwork');
    var data = { nodes: nodes, edges: edges };
    
    // 設定高自由度的物理引擎，讓使用者爽快地拉扯
    var options = {
      physics: {
        forceAtlas2Based: {
          gravitationalConstant: -120,
          centralGravity: 0.015,
          springLength: 200,
          springConstant: 0.08
        },
        maxVelocity: 50,
        solver: 'forceAtlas2Based',
        timestep: 0.35,
        stabilization: { iterations: 150 }
      },
      edges: {
        font: { size: 14, align: 'horizontal', background: 'rgba(255,255,255,0.9)', strokeWidth: 0 },
        smooth: { type: 'continuous', forceDirection: 'none' }
      },
      interaction: {
        hover: true,
        zoomView: true,
        dragView: true,
        dragNodes: true
      }
    };
    
    var network = new vis.Network(container, data, options);
  </script>
</body>
</html>
