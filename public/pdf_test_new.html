<!DOCTYPE html>
<html>
<head><title>PDF Auto Parse</title></head>
<body>
<h2>PDF Auto Parse — 新範本</h2>
<pre id="output" style="white-space:pre-wrap; font-size:11px; max-height:90vh; overflow:auto;">Loading...</pre>
<script type="module">
import * as pdfjsLib from '/node_modules/pdfjs-dist/build/pdf.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = '/node_modules/pdfjs-dist/build/pdf.worker.mjs';

const out = document.getElementById('output');
function log(...args) {
  out.textContent += args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ') + '\n';
}

async function parseFile(filename) {
  log(`\n===========================================`);
  log(`=========== Analyzing ${filename} ===========`);
  log(`===========================================\n`);
  const resp = await fetch('/' + filename);
  if (!resp.ok) { log('ERROR: Cannot fetch', filename); return; }
  const data = new Uint8Array(await resp.arrayBuffer());
  
  const pdf = await pdfjsLib.getDocument({ data }).promise;
  log('Total pages:', pdf.numPages);
  
  for (let p = 1; p <= Math.min(3, pdf.numPages); p++) {
    log('\n========== Page', p, '==========');
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const items = content.items
      .map(item => ({
        str: item.str.trim(),
        x: Math.round(item.transform[4]),
        y: Math.round(item.transform[5]),
      }))
      .filter(i => i.str !== '');
    
    const allText = items.map(i => i.str).join(' ');
    log('Total items:', items.length);
    log('All text (first 600):', allText.substring(0, 600));
    
    const hasHeader = /公共\s*工程\s*監造\s*報表/.test(allText);
    log('\nHas 監造報表 header:', hasHeader);
    const hasDiaryHeader = /施工日誌/.test(allText);
    log('Has 施工日誌 header:', hasDiaryHeader);
    
    const dateLabelItem = items.find(i => i.str.includes('填表日期') || i.str.includes('日期：') || i.str.includes('日期:'));
    log('可能為日期的 label:', JSON.stringify(dateLabelItem) || 'NOT FOUND');
    
    const dateItems = items.filter(i => /\d{2,4}[\/\-\.年]\d{1,2}[\/\-\.月]\d{1,2}/.test(i.str));
    log('Date-like items:', JSON.stringify(dateItems.slice(0, 8)));
    
    log('\nFirst 50 items (coords):');
    items.slice(0, 50).forEach(i => log(`  x:${i.x} y:${i.y} "${i.str}"`));
  }
}

async function run() {
  out.textContent = '';
  await parseFile('20260209_監造日報.pdf');
  await parseFile('20260330_監造日報.pdf');
  await parseFile('20260330_施工日誌.pdf');
  log('\n=== DONE ===');
}
run().catch(e => { out.textContent = 'ERROR: ' + e.message + '\n' + e.stack; });
</script>
</body>
</html>
